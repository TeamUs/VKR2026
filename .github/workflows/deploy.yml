name: Deploy to Production

on:
  push:
    branches:
      - main  # или master, в зависимости от вашей основной ветки
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /var/www/poizonic-mini-app/poizonic-mini-app_reserve_copy
            
            # Получаем последние изменения из Git
            git pull origin main
            
            # Обновляем зависимости Backend
            cd backend
            npm ci --production
            
            # Обновляем зависимости Frontend
            cd ../frontend
            npm ci
            
            # Собираем Frontend
            npm run build
            
            # Перезапускаем Backend через PM2
            cd ..
            pm2 restart poizonic-backend || pm2 start ecosystem.config.js
            
            # Перезагружаем Nginx
            sudo systemctl reload nginx
            
            echo "✅ Деплой завершен успешно!"

